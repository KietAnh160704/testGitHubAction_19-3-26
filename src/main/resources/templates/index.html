<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Docker Spring Boot</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f8;
            text-align:center;
            margin-top:100px;
        }

        .box{
            background:white;
            padding:40px;
            width:400px;
            margin:auto;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color:#2c7be5;
        }

        button{
            padding:10px 20px;
            border:none;
            background:#2c7be5;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1a5fcc;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Spring Boot chạy thành công 🚀</h1>
    <p>Ứng dụng đang chạy bằng Docker</p>

    <button onclick="hello()">Test</button>

    <p id="msg"></p>
</div>

<script>
function hello(){
    document.getElementById("msg").innerHTML="Xin chào Kiệt Anh!";
}
</script>

</body>
</html>
