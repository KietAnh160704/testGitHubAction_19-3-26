name: Docker CI/CD for Spring Boot

# Kịch bản chạy khi bạn push code lên nhánh master
on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # 2. Cài đặt môi trường Java (Dùng JDK 17 cho Spring Boot)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build file JAR (Bỏ qua chạy test để build nhanh hơn)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Đăng nhập Docker Hub bằng Secret GITHUBSECRETS của Kiệt
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kietanh1607
          password: ${{ secrets.GITHUBSECRETS }}

      # 5. Build Image và Push lên Repository kietanh1607/testdocker
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đảm bảo tên tag này khớp với repository bạn đã tạo trên Docker Hub
          tags: kietanh1607/testdocker:latest
