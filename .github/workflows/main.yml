name: Push to TestDocker

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u kietanh1607 --password-stdin

      - name: Build and Push
        run: |
          docker build -t kietanh1607/testdocker:latest .
          docker push kietanh1607/testdocker:latest
